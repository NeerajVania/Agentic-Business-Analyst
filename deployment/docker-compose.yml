version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    container_name: ada_backend
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/agentdb
      - DATABASE_SYNC_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/agentdb
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - postgres
      - chromadb
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.frontend
    container_name: ada_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
      # Public URL used for browser-side <a href> links.
      # API_BASE uses the internal Docker hostname (backend:8000) which the
      # user's browser cannot reach. This variable overrides that for links.
      - STREAMLIT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ada_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ada_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: agentdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # ── ChromaDB ──────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ada_chromadb
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  chroma_data: